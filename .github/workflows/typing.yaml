---
name: Typing

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --all-packages --group typing
      - name: 🚀 Run mypy
        # The library is the typed, enforced surface ([tool.mypy] files, just
        # typecheck, the pre-commit hook). Tests deliberately feed wrong types,
        # so they are not type-checked.
        run: uv run --no-sync mypy src/probatio
      - name: 🧩 Type-check workspace packages
        run: uv run --no-sync mypy packages/pytest-probatio/src

  ty:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --group typing
      - name: 🚀 Run ty
        # Same scope as mypy and [tool.ty.src]: the library only.
        run: uv run --no-sync ty check src/probatio
