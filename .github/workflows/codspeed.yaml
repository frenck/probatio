name: CodSpeed

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token CodSpeed mints (no CODSPEED_TOKEN secret)
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - name: Install the project
        run: uv sync --locked --group codspeed
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          # v4 makes `mode` required; on a standard runner this is the
          # instrumented measurement v3 ran by default, now named "simulation".
          mode: simulation
          # Clear the global pytest addopts (-q --cov); coverage instrumentation
          # would skew the benchmark timings.
          run: uv run --no-sync pytest bench --codspeed --no-cov -o addopts=""
