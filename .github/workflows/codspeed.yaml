name: CodSpeed

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token CodSpeed mints (no CODSPEED_TOKEN secret)
    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - name: Install the project
        run: uv sync --locked --group codspeed
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          # v4 makes `mode` required; on a standard runner this is the
          # instrumented measurement v3 ran by default, now named "simulation".
          mode: simulation
          # Clear the global pytest addopts (-q --cov); coverage instrumentation
          # would skew the benchmark timings.
          run: uv run --no-sync pytest bench --codspeed --no-cov -o addopts=""
