name: CodSpeed

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: codspeed-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token CodSpeed mints (no CODSPEED_TOKEN secret)
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install the project
        run: uv sync --locked --group codspeed
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@4e969336ab9acd4f6f8d025fdd793292b0835df0 # v4.18.2
        with:
          # v4 makes `mode` required; on a standard runner this is the
          # instrumented measurement v3 ran by default, now named "simulation".
          mode: simulation
          # Clear the global pytest addopts (-q --cov); coverage instrumentation
          # would skew the benchmark timings.
          run: uv run --no-sync pytest bench --codspeed --no-cov -o addopts=""
