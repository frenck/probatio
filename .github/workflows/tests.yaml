---
name: Tests

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14", "3.15"]
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: 🏗 Install dependencies
        run: uv sync --locked --all-packages --group test
      - name: 🚀 Run pytest
        run: >
          uv run --no-sync pytest --cov probatio tests
          --junitxml=junit.xml -o junit_family=legacy
      - name: 🧩 Run workspace package tests
        run: >
          uv run --no-sync pytest packages/pytest-probatio/tests
          -o addopts="" -o junit_family=legacy --junitxml=junit-packages.xml
      - name: 📝 Verify documentation examples
        run: uv run --no-sync python docs/verify_examples.py
      - name: ⬆️ Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.python }}
          include-hidden-files: true
          path: .coverage
      - name: 🧪 Upload test results to Codecov
        # Runs even when the suite failed, so the failed and flaky tests reach
        # Codecov's test analytics.
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  compiled:
    name: Compiled parity ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14", "3.15"]
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: 🏗 Install dependencies
        run: uv sync --locked --all-packages --group test
      # Force schema compilation on for the whole behavioral suite, so the
      # generated engine is proven byte-identical to the interpreted one. No
      # coverage here: this is a parity gate, not a coverage one. The conftest
      # skips the property, fuzz, and compile-specific tests under --compiled.
      - name: 🚀 Run the compiled parity lane
        run: >
          uv run --no-sync pytest --compiled -o addopts=""
          -p no:cacheprovider --junitxml=junit-compiled.xml
          -o junit_family=legacy
      - name: 🧪 Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: ⬇️ Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --group test
      - name: 🚀 Process coverage results
        run: |
          uv run --no-sync coverage combine coverage*/.coverage*
          uv run --no-sync coverage xml -i
      - name: 🚀 Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
