---
name: Lock

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

# Serialize lock runs without cancelling an in-flight run.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lock:
    name: 🔒 Lock closed issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write # Lock closed issues
      pull-requests: write # Lock closed pull requests
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: "30"
          pr-inactive-days: "1"
