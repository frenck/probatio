---
name: Linting

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --group lint
      - name: 🚀 Run ruff check
        run: uv run --no-sync ruff check --output-format=github .
      - name: 🚀 Run ruff format
        run: uv run --no-sync ruff format --check .

  codespell:
    name: Codespell
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --group lint
      - name: 🚀 Run codespell
        run: uv run --no-sync codespell

  zizmor:
    name: Zizmor (Actions security)
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: 🏗 Set up uv and Python
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true
          python-version: "3.13"
      - name: 🏗 Install dependencies
        run: uv sync --locked --group lint
      - name: 🚀 Audit workflows with zizmor
        env:
          # Lets zizmor run its online audits (e.g. action ref checks).
          GH_TOKEN: ${{ github.token }}
        run: uv run --no-sync zizmor .github/workflows/ --persona=pedantic
