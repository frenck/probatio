---
# This workflow uses actions that are not certified by GitHub. They are provided
# by a third-party and are governed by separate terms of service, privacy
# policy, and support documentation.

name: ClusterFuzzLite

# Automatic triggers are disabled until oss-fuzz ships a Python 3.13 base image.
#
# ClusterFuzzLite builds in oss-fuzz's `base-builder-python` image, which ships
# Python 3.11. Probatio requires Python >=3.13, so the package will not install in
# the container and every fuzz build errors out. atheris is tied to the base
# image's interpreter, so the container cannot be made to run 3.13.
#
# In the meantime the harnesses are fuzzed by the `Fuzz` workflow (fuzz.yaml),
# which runs atheris directly on Python 3.13. This workflow stays for its
# coverage-guided, corpus-persisting batch mode (an oss-fuzz feature the plain
# atheris job lacks); restore the `pull_request` and `schedule` triggers below,
# verifying with `workflow_dispatch` first, once a 3.13 base image is available.
#
# yamllint disable-line rule:truthy
on:
  # pull_request:
  #   paths:
  #     - "src/**"
  #     - "fuzz/**"
  #     - "pyproject.toml"
  #     - "uv.lock"
  #     - ".clusterfuzzlite/**"
  #     - ".github/workflows/clusterfuzzlite.yaml"
  # schedule:
  #   - cron: "0 4 * * *" # daily, 04:00 UTC
  workflow_dispatch:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The ClusterFuzzLite actions expect repo-wide read access (the posture their own
# documentation prescribes); write scopes are passed per-step via the token input.
permissions: read-all # zizmor: ignore[excessive-permissions]

jobs:
  # Pull-request gate: a short run over the change, to catch regressions before
  # merge without holding up review.
  code-change:
    name: Fuzz changed code
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: address
      - name: 🚀 Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: code-change
          sanitizer: address

  # Scheduled deep run: longer, and persists/grows the corpus across runs.
  batch:
    name: Fuzz batch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: address
      - name: 🚀 Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 1800
          mode: batch
          sanitizer: address
          # Persist and grow the corpus across runs in a dedicated storage repo.
          # Set FUZZ_STORAGE_TOKEN (a PAT with write access to that repo) to
          # enable persistence; until then the batch still runs, just cold.
          storage-repo: ${{ secrets.FUZZ_STORAGE_TOKEN != '' && format('https://{0}@github.com/frenck/probatio-fuzz-corpus.git', secrets.FUZZ_STORAGE_TOKEN) || '' }}
