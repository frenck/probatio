---
# Hooks for prek (https://prek.j178.dev), a fast, drop-in pre-commit runner.
# Run all hooks with `prek run --all-files` (or `pre-commit run --all-files`).
#
# Every tool that is also a project dependency runs through `uv run` as a local
# hook, so its version comes from uv.lock (the single source of truth) and can
# never drift from a separate `rev:` pin. Only tools that are not Python
# dependencies (the pre-commit file hooks, actionlint, prettier) stay pinned by
# `rev`; each has a single source, so it does not drift either.
ci:
  # pre-commit.ci cannot run the `language: system` hooks below (they need uv),
  # so skip them there; CI enforces them via the dedicated uv-based workflows
  # instead.
  skip:
    - ruff-check
    - ruff-format
    - mypy
    - ty
    - codespell
    - zizmor
  autofix_commit_msg: "chore(pre-commit): auto-fixes from hooks"
  autoupdate_commit_msg: "chore(pre-commit): autoupdate hooks"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-json
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^tests/(?:.*/)?__snapshots__/
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
        exclude: ^tests/(?:.*/)?__snapshots__/

  # actionlint is a Go binary, not a Python dependency, so it stays pinned here.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        # `code-quality` is a current GitHub permission scope that actionlint
        # does not recognize yet; ignore only that specific diagnostic.
        args: ["-ignore", "code-quality"]

  # Markdown / YAML / JSON formatting for the configs and docs.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]

  # Local hooks: every tool runs through uv, so the version is whatever uv.lock
  # pins. No `rev:` to drift.
  - repo: local
    hooks:
      - id: ruff-check
        name: "🐶 Ruff linter"
        language: system
        types: [python]
        entry: uv run --no-sync ruff check --fix
        require_serial: true
      - id: ruff-format
        name: "🐶 Ruff formatter"
        language: system
        types: [python]
        entry: uv run --no-sync ruff format
        require_serial: true
      - id: mypy
        name: "🆎 Static typing with mypy"
        language: system
        types: [python]
        files: ^src/probatio/
        pass_filenames: false
        entry: uv run --no-sync mypy src/probatio
        require_serial: true
      - id: ty
        name: "🆎 Static typing with ty"
        language: system
        types: [python]
        files: ^src/probatio/
        pass_filenames: false
        entry: uv run --no-sync ty check src/probatio
        require_serial: true
      - id: codespell
        name: "🔤 Check for common misspellings"
        language: system
        types: [text]
        entry: uv run --no-sync codespell
      - id: zizmor
        name: "🌈 Audit GitHub Actions workflows with zizmor"
        language: system
        types: [yaml]
        files: ^\.github/workflows/
        pass_filenames: false
        entry: uv run --no-sync zizmor .github/workflows/ --persona=pedantic
